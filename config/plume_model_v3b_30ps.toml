# V3B.1 -- 30 ps analytic plume / shock / ejecta model (Route B)
# Driver: V2.6 threshold-equivalent crater package (ep_5p0uj).
# Display coordinates: surface at z = 0 um, plume expands upward.
# NOT LS-DYNA multiphase, NOT SPH/ALE.
# V3B.1: visual calibration -- larger plume/shock/ejecta for V4 handoff.

[meta]
description = "V3B.1 30 ps parametric plume + shock + ejecta proxy from V2.6 driver."
version = "V3B.1"

[driver]
driver_json = "results/v26_30ps_threshold_ablation/v3b_driver/v3b_driver_ep5p0uj.json"
case_name = "ep_5p0uj"
t0_strategy = "recommended_t0_ps"

[time]
t_start_ps = 0.0
t_end_ns = 5.0
dt_ps = 1.0
snapshot_times_ps = [0, 30, 50, 100, 200, 500, 1000, 2000, 5000]
early_zoom_times_ps = [0, 30, 50, 60, 80, 100, 150, 200, 500]

[plume]
model = "power_law_after_t0"
R0_um = "from_driver_crater_radius"
d0_um = "from_driver_crater_depth"
v0_um_per_ns_power = 35.0
b = 0.72
density_decay_power = 1.2
density_decay_ns = 2.0
sigma_r_fraction = 0.42
sigma_z_fraction = 0.70
z_center_fraction = 0.75
min_sigma_r_um = 5.0
min_sigma_z_um = 5.0

[shock]
model = "linear_plus_sqrt_after_t0"
c0_um_per_ns = 18.0
beta_um_per_sqrt_ns = 25.0
shock_ahead_min_um = 5.0

[ejecta]
enabled = true
model = "shallow_surface_particle_proxy"
initial_radius_um = "from_driver_crater_radius"
initial_depth_um = "from_driver_crater_depth"
particle_count = 1200
max_ejecta_height_um = 120.0
radial_spread_um = 180.0
decay_ns = 2.5
random_seed = 42

[domain]
r_min_um = -200
r_max_um = 200
z_min_um = 0
z_max_um = 400
surface_z_um = 0

[early_zoom]
r_min_um = -80
r_max_um = 80
z_min_um = 0
z_max_um = 120

[plain_imaging]
I_bg = 0.95
silicon_gray = 0.28
tau_eff = 2.5
shock_halo_width_um = 3.5
shock_halo_strength = 0.32

[render]
colormap = "inferno"
dpi = 300
