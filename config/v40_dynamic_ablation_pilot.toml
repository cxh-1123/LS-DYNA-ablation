# =============================================================================
# V4.0A -- dynamic ablation pilot
#
# Purpose:
#   Start the transition from temperature-threshold post-processing to an
#   explicit dynamics ablation workflow.
#
# This pilot is intentionally conservative:
#   1) reuse the V1.7 local refined 30 ps mesh;
#   2) select cases around and above the V1.7 vapor threshold;
#   3) estimate the vapor-zone radius from the V1.7 threshold result;
#   4) generate a structural dynamic LS-DYNA pilot deck with an ejecta impulse;
#   5) export erosion-candidate elements for the next active deletion step.
#
# Units: mm - ms - kg - kN - GPa
# =============================================================================

[meta]
description = "V4.0A dynamic ablation pilot: structural dynamics scaffold for Si ablation."

[source]
v17_config = "config/v17_30ps_local_mesh.toml"
threshold_estimates_csv = "lightweight_results/v17_30ps_local/v17_threshold_estimates.csv"

[material]
rho_kg_mm3 = 2.33e-6
youngs_modulus_GPa = 130.0
poisson_ratio = 0.28
T_melt_K = 1687.0
T_vap_K = 3538.0

[dynamic_solver]
t_end_ns = 5.0
dt_plot_ns = 0.01
timestep_scale = 0.67

[ablation_model]
# From V1.7 threshold estimate.  Used to estimate r_vap(Ep) for a Gaussian spot:
#   Ep_local(r) = Ep * exp(-2 r^2 / w0^2)
#   r_vap = w0 / sqrt(2) * sqrt(log(Ep / vapor_threshold_Ep_uJ))
vapor_threshold_Ep_uJ = 3.0519

# First active layer for pilot dynamics.  This is the region most likely to
# vaporize first in the 30 ps surface-heating model.
active_layer_depth_um = 0.05

# Initial upward velocity assigned to top vapor-zone nodes.
# This is a pilot impulse, not a calibrated plume velocity.
ejecta_velocity_m_s = 500.0

# Radial velocity is kept smaller than axial ejecta velocity in the first pilot.
radial_velocity_fraction = 0.15

# Active deletion is documented but not enabled in the generated deck yet,
# because LS-DYNA erosion-temperature cards are version/material-option specific.
write_erosion_candidates = true

[[selected_cases]]
name = "ep_3p1uj"
Ep_uJ = 3.1
notes = "just above V1.7 vapor threshold"

[[selected_cases]]
name = "ep_3p2uj"
Ep_uJ = 3.2
notes = "above V1.7 vapor threshold"

[[selected_cases]]
name = "ep_4p0uj"
Ep_uJ = 4.0
notes = "clear vapor candidate"

[[selected_cases]]
name = "ep_5p0uj"
Ep_uJ = 5.0
notes = "strong vapor candidate"
