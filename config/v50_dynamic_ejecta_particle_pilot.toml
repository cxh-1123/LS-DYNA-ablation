# =============================================================================
# V5A -- explicit ejecta marker particle pilot
#
# Purpose:
#   Add a visible ejecta/plume marker layer above the V4C pre-deleted crater.
#   This is a robust first step toward SPH/ALE plume modeling: the ejecta are
#   explicit Lagrangian marker shell patches with initial upward/radial velocity.
#
# Important:
#   This is not yet full SPH/ALE hydrodynamics.  It is a solver-robust pilot
#   that makes plume-like material points appear in d3plot, so the visualization
#   and data extraction path can be developed before moving to true SPH/ALE.
#
# Units: mm - ms - kg - kN - GPa
# =============================================================================

[meta]
description = "V5A explicit ejecta marker layer on V4C pre-deleted crater."

[source]
v17_config = "config/v17_30ps_local_mesh.toml"

[material]
rho_kg_mm3 = 2.33e-6
youngs_modulus_GPa = 130.0
poisson_ratio = 0.28

[ejecta_material]
rho_kg_mm3 = 2.33e-7
youngs_modulus_GPa = 1.0
poisson_ratio = 0.10

[dynamic_solver]
t_end_ns = 5.0
dt_plot_ns = 0.01
timestep_scale = 0.67

[deletion_model]
vapor_threshold_Ep_uJ = 3.0519
active_layer_depth_um = 0.05
radial_velocity_fraction = 0.10

[ejecta_layer]
enabled = true
radial_extent_fraction = 1.05
radial_step_um = 0.6
vertical_layers = 14
vertical_spacing_um = 0.25
patch_size_um = 0.14
start_gap_um = 0.08
upward_velocity_m_s = 8500.0
radial_velocity_m_s = 1800.0
velocity_decay_radius_fraction = 0.75
velocity_layer_boost = 0.10
# Sub-particles per patch corner (display density in d3plot / LS-PrePost).
subsample_jitter_um = 0.04

[[selected_cases]]
name = "ep_5p0uj_ejecta_8500ms"
Ep_uJ = 5.0
recoil_velocity_m_s = -5000.0
notes = "V5A first visible ejecta-marker plume pilot; based on V4C 5uJ/5000m/s case."

